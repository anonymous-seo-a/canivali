<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cannibalization-system</title>
    <style>
      :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { margin: 0; padding: 1rem; }
      h1 { margin: 0 0 0.5rem 0; font-size: 1.25rem; }
      .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
      .toolbar input, .toolbar select { padding: 0.25rem 0.5rem; }
      table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
      th, td { text-align: left; padding: 0.4rem; border-bottom: 1px solid #ccc4; }
      th { position: sticky; top: 0; background: var(--bg, #fff); }
      tbody tr:hover { background: #88888822; }
      .pill { display: inline-block; padding: 0 0.4rem; border-radius: 0.5rem; font-size: 0.75rem; }
      .pill.confirmed { background: #e74c3c33; color: #e74c3c; }
      .pill.pending { background: #f39c1233; color: #f39c12; }
      .pill.in_scope { background: #2ecc7133; color: #2ecc71; }
      .footer { margin-top: 1rem; font-size: 0.85rem; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
